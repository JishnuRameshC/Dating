<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #6d84b4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background-color: #6d84b4;
        }
        .header {
            color: white;
            padding: 10px;
            display: flex;
            align-items: center;
        }
        .back-button {
            font-size: 24px;
            margin-right: 20px;
        }
        .recent-matches {
            padding: 10px;
        }
        .recent-matches h2 {
            color: white;
            margin-bottom: 10px;
        }
        .match-avatars {
            display: flex;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .match-avatar {
            flex: 0 0 70px;
            height: 80px;
            margin-right: 10px;
        }
        .match-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
        }
        .messages {
            background-color: white;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 20px;
        }
        .message-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 15px;
        }
        .message-content {
            flex-grow: 1;
        }
        .name {
            font-weight: bold;
        }
        .preview {
            color: #888;
            font-size: 0.9em;
        }
        .time {
            font-size: 0.8em;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="back-button">&#8249;</span>
            <h1>Messages</h1>
        </div>
        <div class="recent-matches">
            <h2>Recent Matches</h2>
            <div class="match-avatars">
                <div class="match-avatar"><img src="https://via.placeholder.com/70x80" alt="Match 1"></div>
                <div class="match-avatar"><img src="https://via.placeholder.com/70x80" alt="Match 2"></div>
                <div class="match-avatar"><img src="https://via.placeholder.com/70x80" alt="Match 3"></div>
                <div class="match-avatar"><img src="https://via.placeholder.com/70x80" alt="Match 4"></div>
            </div>
        </div>
        <div class="messages">
            <div class="message-item">
                <img src="https://via.placeholder.com/50" alt="Alfredo" class="avatar">
                <div class="message-content">
                    <div class="name">Alfredo Calzoni</div>
                    <div class="preview">What about that new jacket if I ...</div>
                </div>
                <div class="time">09:18</div>
            </div>
            <div class="message-item">
                <img src="https://via.placeholder.com/50" alt="Clara" class="avatar">
                <div class="message-content">
                    <div class="name">Clara Hazel</div>
                    <div class="preview">I know right 😉</div>
                </div>
                <div class="time">12:44</div>
            </div>
            <div class="message-item">
                <img src="https://via.placeholder.com/50" alt="Brandon" class="avatar">
                <div class="message-content">
                    <div class="name">Brandon</div>
                    <div class="preview">Am finally registered, can't wai...</div>
                </div>
                <div class="time">08:06</div>
            </div>
            <div class="message-item">
                <img src="https://via.placeholder.com/50" alt="Amina" class="avatar">
                <div class="message-content">
                    <div class="name">Amina Mina</div>
                    <div class="preview"></div>
                </div>
                <div class="time">09:32</div>
            </div>
        </div>
    </div>
</body>
</html>
